spring.application.name=mysteryrealms

spring.datasource.url=${MYSTERYREALMS_DATASOURCE_URL:jdbc:mysql://localhost:3306/mysteryrealms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSTERYREALMS_DATASOURCE_USERNAME:}
spring.datasource.password=${MYSTERYREALMS_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.mail.host=${MYSTERYREALMS_MAIL_HOST:localhost}
spring.mail.port=${MYSTERYREALMS_MAIL_PORT:587}
spring.mail.username=${MYSTERYREALMS_MAIL_USERNAME:}
spring.mail.password=${MYSTERYREALMS_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MYSTERYREALMS_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MYSTERYREALMS_MAIL_SMTP_STARTTLS:true}

mysteryrealms.mail.from=${MYSTERYREALMS_MAIL_FROM}
mysteryrealms.publicBaseUrl=${MYSTERYREALMS_PUBLIC_BASE_URL}
mysteryrealms.world.startingLocationId=${MYSTERYREALMS_WORLD_STARTING_LOCATION_ID:zona_langur_praca_das_vozes}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

logging.level.root=INFO
logging.level.br.eng.rodrigogml.mysteryrealms=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level app=${spring.application.name} requestId=%X{requestId:-N/A} jobId=%X{jobId:-N/A} thread=%thread logger=%logger{36} msg=%msg%n
